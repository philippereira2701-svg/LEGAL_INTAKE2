{% extends "base.html" %}
{% block title %}Lead Detail | LexBridge{% endblock %}

{% block content %}
<div class="container" style="margin-top: 12px;">
    <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 20px;">
        <a href="/dashboard" style="color: var(--text-secondary); text-decoration: none;"><i data-feather="arrow-left"></i></a>
        <h1 class="page-title" style="margin: 0;">Lead Detail</h1>
    </div>
    <div style="display: flex; gap: 32px;">
        <!-- Left Column -->
        <div style="flex: 60%;">
            <div class="stat-card" style="margin-bottom: 24px;">
                <div class="stat-label">Client Information</div>
                <h1 id="clientName">-</h1>
                <div style="display: flex; gap: 24px; margin-top: 16px; color: var(--text-secondary)">
                    <div id="clientPhone">-</div>
                    <div id="clientEmail">-</div>
                </div>
            </div>

            <div class="stat-card" style="margin-bottom: 24px;">
                <div class="stat-label">Incident Description</div>
                <p id="incidentDesc" style="font-family: 'Inter', serif; font-size: 16px; line-height: 1.6;"></p>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">System Timeline</div>
                <div id="timelineList" style="margin-top: 16px;">
                    <!-- Timeline items -->
                </div>
            </div>
        </div>

        <!-- Right Column -->
        <div style="flex: 40%;">
            <div class="stat-card" style="background: #FAFAF9; border-color: var(--accent-blue);">
                <div class="stat-label">Case Assessment</div>
                <div style="display: flex; align-items: baseline; gap: 8px;">
                    <div id="finalScore" class="mono" style="font-size: 48px; font-weight: 600;">-</div>
                    <div style="color: var(--text-muted)">/10</div>
                </div>
                <div id="aiTier" class="badge" style="margin-bottom: 16px; display: inline-block;">-</div>
                <p id="aiSummary" style="color: var(--text-secondary); font-size: 14px;"></p>
            </div>

            <div class="stat-card" style="margin-top: 24px;">
                <div class="stat-label">Red Flags</div>
                <div id="redFlags" style="margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px;">
                    <!-- Flags -->
                </div>
            </div>

            <div class="stat-card" style="margin-top: 24px;">
                <div class="stat-label">Manual Override</div>
                <form id="overrideForm" style="margin-top: 16px;">
                    <select id="newStatus" class="btn" style="width: 100%; margin-bottom: 12px;">
                        <option value="pending">Pending</option>
                        <option value="contacted">Contacted</option>
                        <option value="booked">Booked</option>
                        <option value="rejected">Rejected</option>
                    </select>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Update Status</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
const leadId = window.location.pathname.split('/').pop();
const token = localStorage.getItem('lexbridge_token') || '';

async function fetchLeadDetail() {
    const res = await fetch(`/api/leads/${leadId}`, {
        headers: token ? { 'Authorization': `Bearer ${token}` } : {}
    });
    if (res.ok) {
        const lead = await res.json();
        document.getElementById('clientName').textContent = lead.client_name;
        document.getElementById('clientPhone').textContent = lead.client_phone || 'No phone';
        document.getElementById('clientEmail').textContent = lead.client_email || 'No email';
        document.getElementById('incidentDesc').textContent = lead.incident_description;
        document.getElementById('finalScore').textContent = lead.final_score;
        document.getElementById('aiSummary').textContent = lead.ai_summary;
        
        const tier = document.getElementById('aiTier');
        tier.textContent = lead.ai_tier;
        tier.className = `badge ${lead.final_score >= 8 ? 'badge-green' : lead.final_score >= 5 ? 'badge-amber' : 'badge-red'}`;
        
        document.getElementById('redFlags').innerHTML = lead.red_flags.length ? 
            lead.red_flags.map(f => `<span class="badge badge-amber" style="font-size: 11px;">${f}</span>`).join('') :
            '<span class="badge badge-green">No red flags detected</span>';

        document.getElementById('timelineList').innerHTML = lead.timeline.map(e => `
            <div style="display: flex; gap: 16px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--hover-surface)">
                <div class="mono" style="font-size: 11px; color: var(--text-muted); width: 140px;">
                    ${new Date(e.time).toLocaleString()}
                </div>
                <div>
                    <div style="font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em;">${e.type.replace('_', ' ')}</div>
                </div>
            </div>
        `).join('');
    }
}

document.getElementById('overrideForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const status = document.getElementById('newStatus').value;
    const res = await fetch(`/api/leads/${leadId}/override`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            ...(token ? { 'Authorization': `Bearer ${token}` } : {})
        },
        body: JSON.stringify({ status })
    });
    if (res.ok) {
        alert('Status updated successfully');
        fetchLeadDetail();
    }
});

fetchLeadDetail();
</script>
{% endblock %}
