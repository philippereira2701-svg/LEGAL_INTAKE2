<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexBridge | Admin Command Center</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/typography.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/nav.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/badge.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/buttons.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/modal.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/utilities.css') }}">

    <style>
        body { background: var(--bg-primary); }
        .admin-container { padding: 120px var(--grid-padding) 60px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 3rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 1.5rem; border-radius: var(--radius-md); }
        .stat-value { font-family: var(--font-display); font-size: 2.5rem; color: var(--accent-gold); }
        .lead-table-container { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden; }
        .lead-table { width: 100%; border-collapse: collapse; }
        .lead-table th { text-align: left; padding: 1rem; border-bottom: 1px solid var(--border-subtle); color: var(--text-secondary); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; background: rgba(255,255,255,0.01); }
        .lead-table td { padding: 1.25rem 1rem; border-bottom: 1px solid var(--border-subtle); cursor: pointer; transition: background 0.2s ease; }
        .lead-table tr:hover td { background: rgba(255,255,255,0.02); }
        #live-clock { font-family: var(--font-mono); color: var(--text-secondary); font-size: 0.8rem; }
        
        /* QR Styles */
        #qrcode { background: white; padding: 20px; display: inline-block; border-radius: 12px; margin-bottom: 2rem; }
        #qrcode img { display: block; }
    </style>
</head>
<body>
    <nav class="navbar scrolled">
        <div class="nav-logo">
            <img src="{{ url_for('static', filename='assets/icons/scales.svg') }}" style="width: 24px; filter: brightness(0) saturate(100%) invert(80%) sepia(21%) saturate(980%) hue-rotate(345deg) brightness(87%) contrast(85%);">
            Lex<span class="accent">B</span>ridge <span class="label" style="margin-left: 10px; opacity: 0.5;">Command</span>
        </div>
        <div style="display: flex; gap: 2.5rem; align-items: center;">
            <div id="live-clock">00:00:00</div>
            <button class="btn btn-ghost-gold" onclick="openShare()">Share Portal</button>
        </div>
    </nav>

    <main class="admin-container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label" style="margin-bottom: 0.5rem;">Total Intake</div>
                <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <div class="label" style="margin-bottom: 0.5rem;">Avg. AI Score</div>
                <div class="stat-value" id="stat-avg">0.0</div>
            </div>
            <div class="stat-card">
                <div class="label" style="margin-bottom: 0.5rem;">High Priority</div>
                <div class="stat-value" id="stat-priority">0</div>
            </div>
            <div class="stat-card">
                <div class="label" style="margin-bottom: 0.5rem;">Conv. Rate</div>
                <div class="stat-value" id="stat-conversion">0%</div>
            </div>
        </div>

        <div class="lead-table-container">
            <table class="lead-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Client Detail</th>
                        <th>AI Score</th>
                        <th>Status / Tier</th>
                    </tr>
                </thead>
                <tbody id="leads-body">
                    <!-- Data injected via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Share Modal -->
    <div class="modal-overlay" id="share-overlay" onclick="closeShare()"></div>
    <div class="modal" id="share-modal">
        <div class="modal-header">
            <h3 class="h3">Client Access Portal</h3>
            <button class="close-modal" onclick="closeShare()">✕</button>
        </div>
        <div class="modal-body text-center">
            <p class="body-lg text-secondary mb-8">Direct clients to the premium LexBridge intake form.</p>
            <div id="qrcode"></div>
            <div style="background: rgba(255,255,255,0.05); padding: 1.25rem; border-radius: 8px; border: 1px solid var(--border-subtle); margin-top: 1rem;">
                <span class="label" style="display: block; margin-bottom: 0.5rem; opacity: 0.5;">Secure Portal URL</span>
                <code id="portal-url" style="color: var(--accent-gold); font-family: var(--font-mono); font-size: 0.85rem; word-break: break-all;"></code>
            </div>
            <button class="btn btn-primary mt-8 w-full" onclick="copyUrl()">Copy Link</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const API_KEY = new URLSearchParams(window.location.search).get('key') || '';
        
        async function apiFetch(endpoint) {
            const url = endpoint + (endpoint.includes('?') ? '&' : '?') + 'key=' + API_KEY;
            try {
                const res = await fetch(url);
                if (res.status === 401) {
                    alert("Unauthorized. LexBridge Access Key Required.");
                    window.location.href = '/';
                    return null;
                }
                return await res.json();
            } catch (err) {
                console.error("Fetch error:", err);
                return null;
            }
        }

        async function refresh() {
            const stats = await apiFetch('/api/stats');
            const leads = await apiFetch('/api/leads');
            if (!stats || !leads) return;

            // Update Stats
            document.getElementById('stat-total').innerText = stats.total_leads;
            document.getElementById('stat-avg').innerText = stats.avg_score;
            document.getElementById('stat-priority').innerText = stats.book_now_count;
            document.getElementById('stat-conversion').innerText = stats.conversion_rate + '%';

            // Update Table
            document.getElementById('leads-body').innerHTML = leads.map(l => {
                const scoreColor = l.ai_score >= 8 ? 'var(--success)' : (l.ai_score >= 5 ? 'var(--warning)' : 'var(--error)');
                const date = new Date(l.created_at);
                return `
                    <tr>
                        <td class="micro" style="opacity: 0.5;">${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</td>
                        <td>
                            <div style="font-weight: 500; color: var(--text-primary);">${l.client_name}</div>
                            <div class="small" style="opacity: 0.4; font-family: var(--font-mono);">REF: LB-${l.id.toString().padStart(4, '0')}</div>
                        </td>
                        <td>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <span style="color: ${scoreColor}; font-weight: 600; font-family: var(--font-mono);">${l.ai_score}/10</span>
                            </div>
                        </td>
                        <td><div class="badge badge-gold">${l.ai_tier}</div></td>
                    </tr>
                `;
            }).join('');
        }

        function openShare() {
            const url = window.location.origin + '/';
            document.getElementById('portal-url').innerText = url;
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            new QRCode(qrContainer, { 
                text: url, 
                width: 180, 
                height: 180,
                colorDark : "#09090C",
                colorLight : "#ffffff"
            });
            document.getElementById('share-modal').classList.add('active');
            document.getElementById('share-overlay').classList.add('active');
        }

        function closeShare() {
            document.getElementById('share-modal').classList.remove('active');
            document.getElementById('share-overlay').classList.remove('active');
        }

        function copyUrl() {
            const url = document.getElementById('portal-url').innerText;
            navigator.clipboard.writeText(url);
            alert("Portal link copied to clipboard.");
        }

        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        setInterval(refresh, 10000);
        refresh();
    </script>
</body>
</html>
