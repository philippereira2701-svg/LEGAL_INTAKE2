{% extends "base.html" %}
{% block title %}Login | LexBridge{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="page-title">Welcome back</h2>
        <p class="page-subtitle">Sign in to your firm dashboard.</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="name@firm.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Sign in</button>
        </form>
        <div id="errorMsg" style="color: var(--score-low); margin-top: 16px; font-size: 12px; display: none;"></div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');

    errorMsg.style.display = 'none';
    try {
        const response = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        if (response.ok) {
            const data = await response.json();
            if (data.token) {
                localStorage.setItem('lexbridge_token', data.token);
            }
            window.location.href = '/dashboard';
        } else {
            const data = await response.json();
            errorMsg.textContent = data.message || data.msg || 'Invalid credentials';
            errorMsg.style.display = 'block';
        }
    } catch (err) {
        errorMsg.textContent = 'Connection error. Please try again.';
        errorMsg.style.display = 'block';
    }
});
</script>
{% endblock %}
